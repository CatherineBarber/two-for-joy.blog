baseURL: "https://catherinebarber.github.io"
title: two for joy
paginate: 5
theme: PaperMod

markup:
  goldmark:
    renderHooks:
    image:
      enableDefault: true
      useEmbedded: auto
    link:
      enableDefault: true
      useEmbedded: auto

params:
  defaultTheme: dark
  label:
    darkModeIcon: logoD3.png
    lightModeIcon: logoL3.png
    iconHeight: 64
  homeInfoParams:
    Title: Haha, how did you even find this site??
    Content: Well, come on in anyway and take a place by the fire. This place is very much under construction, so don't judge it too harshly <3
    majorButtons:
        - name: About
          url: about/
        - name: Inspirations
          url: inspirations/
        - name: Search
          url: search/
        - name: Tags
    alignSocialIconsTo: right

  inspirationParams:
    artists:
      - name: Alfred Valley
        embed: brutefort
        socialIcons:
        - name: "Itchio"
          url: "https://alfredvalley.itch.io/"
        - name: "YouTube"
          url: "https://www.youtube.com/@alfredvalley" 
        - name: "Link"
          url: "https://www.hausofvalley.com/" 

      - name: Man Alone
        description: A combination of solo games and philosophy wrapped up in a guy that waffles a lot. Probably the channel thats meant the most to me personally. Help him in his fight against optimisation.
        embed: malone
        socialIcons:
        - name: "YouTube"
          url: "https://www.youtube.com/@amanisalone"

      - name: Gus BC
        embed: "drowningStone"
        socialIcons:
        - name: "Bandcamp"
          url: "https://chalicesofthepast.bandcamp.com/"

      - name: Johan Nohr
        description: Only the creator of one of the most highly praised OSR style games of all time, Mörk Borg. I had played D&D in uni before, but never warmed up to it. It wasn't until I saw Mörk Borg that the TTRPG bug really bit me. I have no words to describe Johans work, every thing he does is gold to me.
        socialIcons:
        - name: "Link"
          url: "https://nohr.se/"

      - name: Snow
        embed: songbirds
        socialIcons:
        - name: "Patreon"
          url: "https://www.patreon.com/cw/snowttrpg"
        - name: "Itchio"
          url: "https://snowttrpg.itch.io/lilancholy"

      - name: Ivan Belikov
        socialIcons:
        - name: "Link"
          url: "https://ivanbelikov.com/"

      - name: Tania Herrero
        embed: "fomoria"
        socialIcons:
        - name: "Link"
          url: "https://thebreadwyrm.com/"
        - name: "Itchio"
          url: "https://tania-herrero.itch.io/"
        - name: "Bluesky"
          url: "@thebreadwyrm.bsky.social"

      - name: WolfSkullJack
        socialIcons:
        - name: "Link"
          url: "https://wolfskulljack.com/"
        - name: "Patreon"
          url: "https://www.patreon.com/wolfskulljack/home"

      - name: Plastiboo
        socialIcons:
        - name: "Link"
          url: "https://hollow-press.net/collections/plastiboo"
        - name: "Tumblr"
          url: "https://plastiboo.tumblr.com/"

      - name: Watt
        socialIcons:
        - name: "Link"
          url: "https://cloudempress.com/"
          
      - name: Johan Egerkrans
        socialIcons:
        - name: "Link"
          url: "https://www.johanegerkrans.com/"

  ShowPostNavLinks: true
  ShowBreadCrumbs: true

  socialIcons: # optional
    - name: "Bluesky"
      url: "https://bsky.app/profile/smallcat.dev"
    - name: "GitHub"
      url: "https://github.com/CatherineBarber/smallcat.blog"

languages:
  en:
    languageName: "English"
    weight: 1
    taxonomies:
      category: categories
      tag: tags
      series: series
    menu:
      main:
        - name: About
          url: about
          weight: 1
        - name: Archive
          url: archives
          weight: 2
        - name: Search
          url: search/
          weight: 2
        - name: Tags
          url: tags/
          weight: 4


outputs:
  home:
    - HTML
    - RSS
    - JSON # necessary for search